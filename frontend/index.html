<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMFBY Crop Insurance System</title>
    <style>
      /* Mobile Responsive Overrides for React inline styles */
      @media (max-width: 768px) {
        /* All grids → single column */
        .gov-grid, .grid-2, .responsive-row-claim,
        div[style] > div[style*="display"] {
          grid-template-columns: 1fr !important;
        }

        /* Dashboard padding */
        .dashboard-container {
          padding: 0.8rem !important;
        }

        /* Cards */
        .glass-card {
          padding: 1rem !important;
        }

        /* Headings */
        h1 { font-size: 1.3rem !important; }
        h2 { font-size: 1.1rem !important; }

        /* Tables scroll horizontally */
        table { font-size: 0.78rem !important; }
        th, td { padding: 6px 8px !important; }

        /* Upload box smaller */
        .upload-box { height: 200px !important; }

        /* Login/Register page */
        .glass-card[style] {
          max-width: 100% !important;
          padding: 1.5rem !important;
        }
      }

      @media (max-width: 480px) {
        .dashboard-container { padding: 0.5rem !important; }
        .glass-card { padding: 0.8rem !important; border-radius: 10px !important; }
        h1 { font-size: 1.1rem !important; }
        h2 { font-size: 1rem !important; }
        h3 { font-size: 0.9rem !important; }
        .btn-gov { padding: 0.6rem 0.8rem !important; font-size: 0.8rem !important; }
        .gov-input { padding: 0.7rem !important; font-size: 0.85rem !important; }
        .upload-box { height: 180px !important; }
        .badge { font-size: 0.6rem !important; padding: 2px 6px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Mobile responsive: force all inline grids to single column on small screens
      function fixMobileGrids() {
        if (window.innerWidth <= 768) {
          document.querySelectorAll('[style]').forEach(el => {
            const s = el.style;
            if (s.gridTemplateColumns && s.gridTemplateColumns !== '1fr') {
              el.dataset.desktopGrid = s.gridTemplateColumns;
              s.gridTemplateColumns = '1fr';
            }
          });
        } else {
          document.querySelectorAll('[data-desktop-grid]').forEach(el => {
            el.style.gridTemplateColumns = el.dataset.desktopGrid;
            delete el.dataset.desktopGrid;
          });
        }
      }
      window.addEventListener('resize', fixMobileGrids);
      // Run periodically to catch React re-renders
      setInterval(fixMobileGrids, 1000);
      // Initial run after React renders
      setTimeout(fixMobileGrids, 500);
    </script>
  </body>
</html>
