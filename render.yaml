databases:
  - name: farmer-claim-db
    plan: free
    databaseName: pmfby
    user: pmfby_user

services:
  # Backend - FastAPI
  - type: web
    name: farmer-claim-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: farmer-claim-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend - React (Static Site)
  - type: web
    name: farmer-claim-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: starter
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
